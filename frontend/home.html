<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fitness Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN for mobile menu icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            overflow-y: scroll;
            background-color: #000;
            scroll-behavior: smooth; /* Smooth scrolling */
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #ffcc00;
            border-radius: 10px;
            border: 3px solid #1a1a1a;
        }
        .carousel {
            position: relative;
            overflow: hidden;
            height: 100vh;
        }
        .carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
        }
        .carousel img.active {
            opacity: 1;
            visibility: visible;
        }
        @media (max-width: 768px) {
            .carousel img {
                height: 50vh;
            }
        }
        .carousel-buttons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .carousel-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #fff;
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .carousel-button.active {
            opacity: 1;
            background-color: #ffcc00;
        }
        .navbar {
            transition: background-color 0.3s ease-in-out;
            background-color: rgba(0, 0, 8, 0.677);
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
        }
        .navbar a:hover {
            color: #ffcc00;
        }
        .hero-section {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .hero-section h1 {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(90deg, #ff6347, #ffcc33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Mobile Menu */
        .mobile-menu {
            display: none;
            background-color: #000;
            position: absolute;
            top: 56px;
            right: 0;
            width: 100%;
            padding: 1rem;
            transition: transform 0.3s ease;
            transform: translateX(100%);
        }
        .mobile-menu.open {
            transform: translateX(0);
        }
        .mobile-menu ul {
            list-style: none;
            padding: 0;
        }
        .mobile-menu ul li {
            margin-bottom: 1rem;
        }
        .mobile-menu ul li a {
            text-decoration: none;
            color: #fff;
        }
        .mobile-menu ul li a:hover {
            color: #ffcc00;
        }
        .mobile-menu ul li a:focus {
            outline: 2px solid #ffcc00;
        }

        /* Active Page Underline */
        .navbar a:not(.login):not(.logout) {
            position: relative;
        }
        .navbar a:not(.login):not(.logout)::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #ffcc00;
            transition: width 0.3s ease;
        }
        .navbar a:not(.login):not(.logout):hover::after,
        .navbar a:not(.login):not(.logout).active::after {
            width: 100%;
        }
        
         /* Loader animation */
         .loader {
                border: 5px solid rgba(255, 255, 255, 0.3);
                border-top: 5px solid #ffcc00;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

/* Prevent scrolling while loading */
            body.loading {
             overflow: hidden;
        }

    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar shadow-lg fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between py-4">
                <a class="flex items-center py-2 px-2 text-white font-semibold text-xl" href="home.html">FITNESS PRO</a>
                <div class="hidden md:flex space-x-4 font-bold">
                    <a href="home.html" class="active text-yellow-400">Home</a>
                    <a href="about.html" class="text-yellow-400">About</a>
                    <a href="features.html" class="text-yellow-400">Features</a>
                    <a href="details.html" class="text-yellow-400">Details</a>
                    <a href="goal.html" class="text-yellow-400">Goal</a>
                    <a href="trainers.html" class="text-yellow-400">Trainers</a>
                    <a href="profile.html" class="text-yellow-400">Profile</a>
                    <a href="review.html" class="text-yellow-400">Rate</a>
                    <a href="http://localhost/fitness_website/backend/logout.php" class="text-yellow-400">Logout <i class="fas fa-sign-out-alt"></i></a>
                </div>
    <button class="md:hidden mobile-menu-button" aria-label="Toggle Menu" onclick="toggleMobileMenu()">

                    <i class="fas fa-bars text-white"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu hidden">

        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="details.html">Details</a></li>
            <li><a href="trainers.html">Trainers</a></li>
            <li><a href="goal.html">Goal</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="review.html">Rate</a></li>
            <li><a href="http://localhost/fitness_website/backend/logout.php">Logout</a></li>
        </ul>
    </div>

    <!-- Hero Section -->
    <div class="carousel">
        <img class="carousel-image active" src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&h=600&fit=crop" alt="A person lifting weights in a gym with intense focus">
        <img class="carousel-image" src="https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?w=1200&h=600&fit=crop" alt="A serene yoga session with people in various yoga poses">
        <img class="carousel-image" src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1200&h=600&fit=crop" alt="A personal trainer guiding a client through a workout">
        <div class="absolute inset-0 flex items-center justify-center text-center hero-section">
            <div class="text-white">
                <h1 class="text-6x1 md:text-6xl font-bold uppercase">transform your life today</h1>
                <p class="mt-5 text-2xl">Join our community and start your fitness journey today.</p>
            </div>
        </div>
        <div class="carousel-buttons">
            <div class="carousel-button active" data-index="0"></div>
            <div class="carousel-button" data-index="1"></div>
            <div class="carousel-button" data-index="2"></div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-black z-50">
        <div class="loader"></div>
    </div>

<!-- Trainer Response Popup -->
<div id="trainerPopup" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-gray-900 text-white p-6 rounded-lg shadow-xl w-96 max-w-full transform transition-all duration-300 scale-95">
        <h2 class="text-xl font-bold text-yellow-400">Trainer Response</h2>
        <p id="trainerPopupText" class="text-lg mt-3 text-gray-300 leading-relaxed"></p>
        <button onclick="closeTrainerPopup()" class="mt-4 bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full w-full transition duration-300">OK</button>
    </div>
</div>


    <!-- Scripts -->
    <script>
        // Show loader when the page starts loading
        document.body.classList.add("loading");

        // Hide loader when the page is fully loaded
        window.addEventListener("load", function() {
            document.getElementById("loader").style.display = "none";
            document.body.classList.remove("loading");
        });

        // Carousel
        const images = document.querySelectorAll('.carousel-image');
        const buttons = document.querySelectorAll('.carousel-button');
        let currentImageIndex = 0;
        
        function showImage(index) {
            images[currentImageIndex].classList.remove('active');
            buttons[currentImageIndex].classList.remove('active');
            currentImageIndex = index;
            images[currentImageIndex].classList.add('active');
            buttons[currentImageIndex].classList.add('active');
        }

        function showNextImage() {
            const nextIndex = (currentImageIndex + 1) % images.length;
            showImage(nextIndex);
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const index = parseInt(button.getAttribute('data-index'));
                showImage(index);
            });
        });

        setInterval(showNextImage, 3000);

        window.addEventListener("scroll", function () {
            if (window.scrollY > 50) {
                navbar.classList.add("bg-black", "shadow-md");
            } else {
                navbar.classList.remove("bg-black", "shadow-md");
            }
        });

    function toggleMobileMenu() {
        const menu = document.querySelector(".mobile-menu");
        menu.classList.toggle("hidden");
        menu.classList.toggle("open");
    }


    // Fetch notifications when the page loads
 

    function fetchTrainerNotifications() {
        fetch("http://localhost/fitness_website/backend/fetch_notifications.php")
        .then(response => response.json())
        .then(data => {
            if (data.success && data.notifications.length > 0) {
                document.getElementById("trainerPopupText").innerHTML = data.notifications.join("<br>");
                const popup = document.getElementById("trainerPopup");
                popup.classList.remove("hidden");
                popup.classList.add("scale-100");
            }
        })
        .catch(error => console.error("Error fetching notifications:", error));
    }

    function closeTrainerPopup() {
        const popup = document.getElementById("trainerPopup");
        popup.classList.remove("scale-100");
        popup.classList.add("scale-95", "opacity-0");
        setTimeout(() => popup.classList.add("hidden"), 300); // Hides the popup after animation
    }

    // Fetch notifications when the page loads
    window.onload = function() {
        fetchTrainerNotifications();
    };


    </script>
</body>
</html>
