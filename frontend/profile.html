<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Profile - FitnessPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            overflow-y: scroll;
            background-color: #000;
            scroll-behavior: smooth;
        }
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #ffcc00;
            border-radius: 10px;
            border: 3px solid #1a1a1a;
        }
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(8px);
            z-index: -1;
        }
        .navbar {
            transition: background-color 0.3s ease-in-out;
            background-color: rgba(0, 0, 8, 0.550);

        }
        .navbar.scrolled {
            background-color: rgba(0, 0, 0, 0.85);
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
        }
        .navbar a:hover {
            color: #ffcc00;
        }
        .hero-section {
            background-color: rgba(0, 0, 0, 0.7);
        }
        .hero-section h1 {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(90deg, #ff6347, #ffcc33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mobile-menu {
            display: none;
            background-color: #000;
            position: absolute;
            top: 56px;
            right: 0;
            width: 100%;
            padding: 1rem;
            transition: transform 0.3s ease;
            transform: translateX(100%);
        }
        .mobile-menu.open {
            transform: translateX(0);
        }
        .mobile-menu ul {
            list-style: none;
            padding: 0;
        }
        .mobile-menu ul li {
            margin-bottom: 1rem;
        }
        .mobile-menu ul li a {
            text-decoration: none;
            color: #fff;
        }
        .mobile-menu ul li a:hover {
            color: #ffcc00;
        }
        .mobile-menu ul li a:focus {
            outline: 2px solid #ffcc00;
        }
        .profile-card {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }
        .profile-card-body {
            padding: 1.5rem;
            text-align: center;
            background-color: #111;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .profile-card-body h3 {
            font-size: 1.5rem;
            color: #ffcc00;
            margin-bottom: 1rem;
        }
        .profile-card-body p {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .profile-card-body button {
            background-color: #ffcc00;
            color: #000;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .profile-card-body button:hover {
            background-color: #e6b800;
        }
        .profile-card-body input, .profile-card-body select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #222;
            color: #fff;
        }
        .profile-card-body label {
            color: #ffcc00;
            font-size: 1rem;
            margin-bottom: 0.5rem;
            display: block;
            text-align: left;
        }
        /* Loader animation */
            .loader {
                border: 5px solid rgba(255, 255, 255, 0.3);
                border-top: 5px solid #ffcc00;
                border-radius: 50%;
                width: 50px;
                height: 50px;
                animation: spin 1s linear infinite;
            }   

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
            }

        /* Prevent scrolling while loading */
        body.loading {
                overflow: hidden;
        }

        /* Active Page Underline */
        .navbar a:not(.login):not(.logout) {
                    position: relative;
                }
                
                .navbar a:not(.login):not(.logout)::after {
                    content: '';
                    position: absolute;
                    width: 0;
                    height: 2px;
                    bottom: -4px;
                    left: 0;
                    background-color: #ffcc00;
                    transition: width 0.3s ease;
                }
                
                .navbar a:not(.login):not(.logout):hover::after,
                .navbar a:not(.login):not(.logout).active::after {
                    width: 100%;
                }
       
    </style>
</head>
<body>
    <img alt="Background image of fitness enthusiasts working out in a modern gym" class="background-image" src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&h=600&fit=crop"/>
    
    <!-- Navbar -->
    <nav class="navbar shadow-lg fixed top-0 w-full z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between py-4">
                <a class="flex items-center py-2 px-2 text-white font-semibold text-xl" href="home.html">FITNESS PRO</a>
                <div class="hidden md:flex space-x-4 font-bold">
                    <a href="home.html" class="text-yellow-400">Home</a>
                    <a href="about.html" class="text-yellow-400">About</a>
                    <a href="features.html" class="text-yellow-400">Features</a>
                    <a href="details.html" class="text-yellow-400">Details</a>
                    <a href="goal.html" class="text-yellow-400">Goal</a>
                    <a href="trainers.html" class="text-yellow-400">Trainers</a>
                    <a href="profile.html" class="active text-yellow-400">Profile</a>
                    <a href="review.html" class="text-yellow-400">Rate</a>
                    <a href="http://localhost/fitness_website/backend/logout.php" class="text-yellow-400">Logout <i class="fas fa-sign-out-alt"></i></a>
                </div>
                <button class="md:hidden mobile-menu-button" aria-label="Toggle Menu">
                    <i class="fas fa-bars text-white"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Loader -->
<div id="loader" class="fixed inset-0 flex items-center justify-center bg-black z-50">
    <div class="loader"></div>
</div>

    <!-- Mobile Menu -->    
    <div class="hidden mobile-menu">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="details.html">Details</a></li>
            <li><a href="trainers.html">Trainers</a></li>
            <li><a href="goal.html">Goal</a></li>   
            <li><a href="profile.html">Profile</a></li>
            <li><a href="review.html">Rate</a></li>
            <li><a href="http://localhost/fitness_website/backend/logout.php">Logout</a></li>
        </ul>
    </div>

    <!-- Profile Section -->
    <section class="py-20 bg-black bg-opacity-85">
        <div class="max-w-6xl mx-auto px-4">
            <div class="text-center mb-12">
                <h2 class="text-4xl font-bold text-yellow-400">My Profile</h2>
                <p class="mt-4 text-white">View and manage your profile details.</p>
            </div>
            <div class="flex justify-center">
                <div class="w-full md:w-1/2 px-4 mb-8">
                    <div class="profile-card">
                        <div class="profile-card-body">
                            <h3 class="text-2xl font-semibold text-yellow-400 mb-4">Profile Details</h3>
                            <form id="profileForm">
                                <label for="username">Username</label>
                                <input id="username" name="name" type="text" placeholder="Enter your Username" required />
                            
                                <label for="email">Email</label>
                                <input id="email" name="email" type="email" placeholder="abc@gmail.com" readonly />
                            
                                <label for="gender">Gender</label>
                                <select id="gender" name="gender">
                                    <option value="" disabled selected>Select your gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            
                                <label for="weight">Weight</label>
                                <input id="weight" name="weight" type="number" placeholder="Enter your Weight" required />
                            
                                <button type="submit">Save</button>
                            </form>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        // Show loader when the page starts loading
        document.body.classList.add("loading");
    
        // Hide loader when the page is fully loaded
        window.addEventListener("load", function () {
            document.getElementById("loader").style.display = "none";
            document.body.classList.remove("loading");
        });
    
        // Mobile Menu
        const btn = document.querySelector("button.mobile-menu-button");
        const menu = document.querySelector(".mobile-menu");
    
        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
            menu.classList.toggle("open");
        });
    
        // Navbar Scroll Effect
        const navbar = document.querySelector(".navbar");
        window.addEventListener("scroll", function () {
            if (window.scrollY > 50) {
                navbar.classList.add("scrolled");
            } else {
                navbar.classList.remove("scrolled");
            }
        });
    
        // Fetch and prefill user profile data
        document.addEventListener("DOMContentLoaded", function () {
            fetch("http://localhost/fitness_website/backend/get_user_profile.php")
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("username").value = data.user.name;
                        document.getElementById("email").value = data.user.email;
                        document.getElementById("gender").value = data.user.gender;
                        document.getElementById("weight").value = data.user.weight;
                    } else {
                        showPopup("Error fetching profile data.");
                    }
                })
                .catch(error => console.error("Error:", error));
        });
    
        // Handle profile update form submission with popup
        document.getElementById("profileForm").addEventListener("submit", function (event) {
            event.preventDefault();
    
            fetch("http://localhost/fitness_website/backend/update_profile.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams(new FormData(this)).toString()
            })
            .then(response => response.json())
            .then(data => {
                if (data.popup) {
                    showPopup(data.message);
                }
            })
            .catch(error => console.error("Error:", error));
        });
    
        // Fetch and display active goal
        document.addEventListener("DOMContentLoaded", function () {
            fetch("http://localhost/fitness_website/backend/get_active_goals.php")
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById("activeGoal").innerText = `Active Goal: ${data.goal}`;
                    } else {
                        document.getElementById("activeGoal").innerText = "No goal set.";
                    }
                })
                .catch(error => console.error("Error:", error));
        });
    
        // Popup Functionality
        function showPopup(message) {
            const popup = document.createElement("div");
            popup.innerHTML = `
                <div style="position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
                            background:white; padding:20px; border-radius:10px; box-shadow:0px 0px 10px rgba(0,0,0,0.2);
                            text-align:center;">
                    <p>${message}</p>
                    <button onclick="closePopup()" style="background:#ffcc00; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
                        OK
                    </button>
                </div>
            `;
            document.body.appendChild(popup);
        }
    
        function closePopup() {
            document.body.removeChild(document.body.lastChild);
        }
    </script>
    
</body>
</html>
