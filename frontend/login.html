<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000;
        }
        .container {
            min-height: 100vh;
        }
        .form-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: #fff;
        }
        .input-field:focus {
            outline: none;
            border-color: #ffcc00; /* Neon yellow border */
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.8);
        }
        .select-field {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: #fff;
        }
        .select-field:focus {
            outline: none;
            border-color: #ffcc00; /* Neon yellow border */
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.8);
        }
    </style>
</head>
<body>
    <div class="flex items-center justify-center container">
        <div class="w-full max-w-md form-box text-white">
            <!-- New Login Form -->
            <h2 class="text-3xl font-bold text-center text-yellow-400">Welcome Back!</h2>
            <p class="text-center text-gray-400 mb-6">Login to continue your fitness journey</p>
            <form action="http://localhost/fitness_website/backend/login.php" method="POST">
                <!-- Email Input -->
                <div class="mb-4">
                    <label class="block mb-2">Email</label>
                    <input type="email" name="email" class="w-full p-3 input-field rounded" placeholder="Enter your email" required>
                </div>
                <!-- Password Input with Eye Icon -->
                    <div class="mb-4 relative">
                    <label class="block mb-2">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="passwordField" class="w-full p-3 input-field rounded pr-10" placeholder="Enter your password" required>
                        <span class="absolute inset-y-0 right-3 flex items-center cursor-pointer" onclick="togglePassword()">
                            <i id="eyeIcon" class="fas fa-eye text-gray-400"></i>
                        </span>
                    </div>
                </div>

                <!-- Role Selection -->
                <div class="mb-4">
                    <label class="block mb-2">Role</label>
                    <select name="role" class="w-full p-3 select-field rounded bg-gray-800" required>
                        <option value="user">User</option>
                        <option value="trainer">Trainer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <!-- Login Button -->
                <button type="submit" class="w-full bg-yellow-400 text-black p-3 rounded hover:bg-yellow-300 transition">Login</button>
                
                <!-- Register Link -->
                <div class="mt-4 text-center text-gray-400">
                    <p class="mt-2">Don't have an account? <a href="register.html" class="text-yellow-400 hover:text-yellow-500 transition">Register</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Popup Modal -->
    <div id="popupMessage" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center">
        <div class="bg-white p-6 rounded-lg shadow-lg text-center">
            <p id="popupText" class="text-lg font-semibold"></p>
            <button onclick="closePopup()" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">OK</button>
        </div>
    </div>

    <script>
        function showPopup(message, redirectUrl = null) {
            document.getElementById("popupText").innerText = message;
            document.getElementById("popupMessage").classList.remove("hidden");

            if (redirectUrl) {
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 2000); // Redirect after 2 seconds
            }
        }

        function closePopup() {
            document.getElementById("popupMessage").classList.add("hidden");
        }

        // Check for messages from PHP
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('message')) {
            showPopup(urlParams.get('message'), urlParams.get('redirect'));
        }
        // Password toggle functionality
        function togglePassword() {
        const passwordField = document.getElementById("passwordField");
        const eyeIcon = document.getElementById("eyeIcon");

        if (passwordField.type === "password") {
            passwordField.type = "text";
            eyeIcon.classList.remove("fa-eye");
            eyeIcon.classList.add("fa-eye-slash");
        } else {
            passwordField.type = "password";
            eyeIcon.classList.remove("fa-eye-slash");
            eyeIcon.classList.add("fa-eye");
        }
    }
    </script>
</body>
</html>
